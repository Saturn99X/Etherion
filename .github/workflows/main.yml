name: Frontend Build & Type Check

on:
  push:
    branches: [main]
    paths:
      - 'frontend/lobechat-app/**'
      - 'frontend/vendor/**'
      - '.github/workflows/main.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/lobechat-app/**'
      - 'frontend/vendor/**'

jobs:
  build:
    name: Build LobeChat Frontend
    runs-on: ubuntu-latest   # 2 vCPU / 7 GB RAM — we'll add swap below
    defaults:
      run:
        working-directory: frontend/lobechat-app

    env:
      NEXT_TELEMETRY_DISABLED: 1
      # Dummy build-time values so Next.js env validation passes
      UNSAFE_SECRET: 'ci-placeholder-secret-32chars-xx'
      KEY_VAULTS_SECRET: 'ci-placeholder-secret-32chars-xx'
      NEXT_AUTH_SECRET: 'ci-placeholder-secret-32chars-xx'
      NEXTAUTH_URL: 'http://localhost:3010'
      AUTH_URL: 'http://localhost:3010/api/auth'
      DATABASE_URL: 'postgresql://postgres:password@localhost:5432/lobechat'
      DATABASE_DRIVER: 'node'
      NEXT_PUBLIC_ENABLE_NEXT_AUTH: '1'
      APP_URL: 'http://localhost:3010'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GitHub runners ship with a pre-mounted /swapfile (~4 GB).
      # Remove it, reclaim the disk space, and replace with a larger one
      # so webpack's ~12 GB peak fits within 7 GB RAM + 8 GB swap.
      - name: Expand swap to 8 GB
        run: |
          sudo swapoff /swapfile || true
          sudo rm -f /swapfile
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create vendor symlink
        run: ln -sfn ../vendor vendor

      - name: Type check
        run: bun run type-check
        continue-on-error: true

      - name: Build
        # Run next build directly to skip prebuild/postbuild lifecycle hooks
        # (prebuild runs lint + tsx scripts/prebuild.mts which aren't needed in CI
        #  and scripts/ is not committed to the repo)
        run: ./node_modules/.bin/next build --webpack
        env:
          NODE_OPTIONS: '--max-old-space-size=10240'
          DOCKER: 'true'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: lobechat-build-${{ github.sha }}
          path: frontend/lobechat-app/.next
          retention-days: 7
          include-hidden-files: true
