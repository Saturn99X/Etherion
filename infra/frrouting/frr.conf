! FRRouting BGP configuration stub
! See https://docs.frrouting.org/ for full documentation

frr version 9.0
frr defaults traditional
hostname etherion-router
log syslog informational
no ipv6 forwarding

!
router bgp 65001
 bgp router-id 192.168.1.1
 !
 ! Announce Etherion's public IP block to the internet
 network 203.0.113.0/24
 !
 ! Peer with upstream provider
 neighbor 198.51.100.1 remote-as 65000
 neighbor 198.51.100.1 description "Upstream Provider"
 !
 ! If dual-site: peer with Singapore rack
 ! neighbor 192.168.100.1 remote-as 65002
 ! neighbor 192.168.100.1 description "Singapore PoP"

line vty
!
