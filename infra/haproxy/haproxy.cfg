global
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 50000
    user haproxy
    group haproxy
    daemon
    stats socket /run/haproxy/admin.sock mode 660 level admin

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s

# Stats page
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST

# Etherion API (round-robin across API nodes)
frontend etherion_api
    bind *:80
    mode http
    default_backend etherion_api_nodes

backend etherion_api_nodes
    mode http
    balance roundrobin
    option httpchk GET /health
    server api-01 192.168.1.10:8080 check
    server api-02 192.168.1.11:8080 check

# PostgreSQL primary routing (via Patroni REST API health check)
# Only routes to the current primary (responds 200 to GET /primary)
frontend postgres_primary
    bind *:5000
    mode tcp
    default_backend patroni_primary

backend patroni_primary
    mode tcp
    option httpchk GET /primary
    http-check expect status 200
    server pg-01 192.168.1.20:5432 check port 8008
    server pg-02 192.168.1.21:5432 check port 8008 backup

# PostgreSQL read-only replicas
frontend postgres_replicas
    bind *:5001
    mode tcp
    default_backend patroni_replicas

backend patroni_replicas
    mode tcp
    option httpchk GET /replica
    http-check expect status 200
    server pg-01 192.168.1.20:5432 check port 8008
    server pg-02 192.168.1.21:5432 check port 8008
